<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <title>
      {% block title %}

      {% endblock %}
    </title>
  </head>

  <body>
    <nav class="navbar navbar-expand-lg bg-dark text-light sticky-top">
      <div class="container-fluid">
        <a class="navbar-brand text-light" href="{% url 'indexPage' %}"><h1>Inicio</h1></a>
        <button class="navbar-toggler navbar-light bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-lg-0">
            <li class="navbar-item">
              <a class="nav-link text-light" href="{% url 'competidoresPage' %}"><h6>Competidores</h6></a>
            </li>
            <li class="navbar-item">
              <a class="nav-link text-light" href="{% url 'eventosPage' %}"><h6>Eventos</h6></a>
            </li>
          </ul>
          {% if request.user.is_staff %}
            <a class="navbar-item btn btn-outline-light mx-lg-3" href="{% url 'administracion' %}">Admin</a>
          {% endif %}
          {% if user.is_authenticated %}
            <div class="d-flex align-items-center">
              <span class="text-light me-3">Hola, {{ request.user.username }}</span>
              <a class="navbar-item btn btn-outline-light" href="{% url 'logout' %}">Cerrar Sesión</a>
            </div>
          {% else %}
            <a class="navbar-item btn btn-outline-light" href="{% url 'login' %}">Iniciar Sesión</a>
          {% endif %}
        </div>
      </div>
    </nav>
    {% block corpo %}

    {% endblock %}
  </body>
</html>
