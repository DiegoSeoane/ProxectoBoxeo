<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <title>
      {% block title %}

      {% endblock %}
    </title>
  </head>

  <body>
    <nav class="navbar navbar-expand-lg bg-dark text-light sticky-top">
      <div class="container-fluid">
        <a class="navbar-brand text-light" href="{% url 'indexPage' %}"><h1>Inicio</h1></a>
        <button class="navbar-toggler navbar-light bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-lg-0">
            <li class="navbar-item">
              <a class="nav-link text-light" href="{% url 'competidoresPage' %}"><h6>Competidores</h6></a>
            </li>
            <li class="navbar-item">
              <a class="nav-link text-light" href="{% url 'eventosPage' %}"><h6>Eventos</h6></a>
            </li>
          </ul>
          <a class="navbar-item btn btn-outline-light mx-lg-3" href="{% url 'administracion' %}">Admin</a>
          <button class="navbar-item btn btn-outline-light" data-bs-toggle="modal" data-bs-target="#modalHeader">Iniciar Sesión</button>
        </div>
      </div>
    </nav>

    <div class="modal fade" id="modalHeader" tabindex="-1" aria-labelledby="modalHeaderLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="modalHeaderLabel">Inicio de sesión</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
              <label for="username" class="form-label">Usuario</label>
              <input class="form-control" id="username" placeholder="Usuario" />
            </div>
            <div class="mb-3">
              <label for="inputPassword" class="col-sm-2 col-form-label">Contrasinal</label>
              <div class="col-sm-10">
                <input type="password" class="form-control" id="inputPassword" />
              </div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-primary">Iniciar</button>
              <a href="{% url 'rexistroUsuario' %}" class="btn btn-danger">Rexistrarse</a>
            </div>
          </div>
        </div>
      </div>
    </div>
    {% block corpo %}

    {% endblock %}
  </body>
</html>
