{% extends 'header.html' %}
{% block title %}
  Administración
{% endblock %}
{% block corpo %}
  <div class="container mt-5 text-center">
    <a href="{% url 'engadir' %}" class="btn p-3 px-5 mx-3 btn-success rounded-pill">Engadir</a>
    <a href="{% url 'modificar' %}" class="btn p-3 px-5 mx-3 btn-primary rounded-pill">Modificar</a>
    <a href="{% url 'eliminar' %}" class="btn p-3 px-5 mx-3 btn-danger rounded-pill">Eliminar</a>
  </div>
  <hr />
  <div class="container mt-5">
    <h2 class="text-center mb-4">Modificar {{ tipo }}</h2>

    <div class="row justify-content-center">
      <div class="col-md-8">
        <form method="post" enctype="multipart/form-data" class="bg-light p-5 rounded shadow-sm">
          {% csrf_token %}
          <div class="mb-3">{{ form.as_p }}</div>
          <button type="submit" class="btn btn-primary btn-lg w-100">Guardar cambios</button>
        </form>
      </div>
    </div>
  </div>
{% endblock %}
